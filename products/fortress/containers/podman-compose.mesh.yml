# DEPRECATED: Mesh orchestrator is now defined in podman-compose.yml (profiles: ["mesh"])
#
# Use instead:
#   podman-compose up -d mesh-orchestrator     (from main compose)
#   install.sh --enable-mesh                   (during installation)
#
# This file used bridge network (172.20.200.70) which required port forwarding.
# The main compose definition uses host network so fts-mesh listens directly
# on 10.200.0.1:8144 for LAN peers (Guardian/Sentinel).
#
# Kept for reference only. Do not use.
#
# Version: 5.5.0 (deprecated)
# License: AGPL-3.0

version: '3.8'

services:
  # ============================================================
  # MESH TIER - Inter-Product Communication (HTP/Neuro/DSM)
  # ============================================================

  # Mesh Orchestrator - HTP/Neuro/DSM Communication Hub
  # Enables secure mesh communication with Guardian, Sentinel, Nexus
  #
  # Canonical ports (ARCHITECTURE.md + port_manager.py):
  #   PRIMARY:   8144/UDP + 8144/TCP    (HTP native, IANA unassigned)
  #   FALLBACK:  443/UDP  + 443/TCP     (QUIC/TLS cover)
  #   STEALTH:   853/UDP  + 853/TCP     (DoQ/DoT cover)
  #   RELAY:     3478/UDP               (STUN/TURN)
  #
  # Fortress overrides (avoid local port conflicts):
  #   FALLBACK → 8543 (web UI runs on 8443)
  #   STEALTH  → 8853 (dnsXai DoT on 853)
  mesh-orchestrator:
    build:
      context: ../..
      dockerfile: products/fortress/containers/Containerfile.mesh
    image: localhost/fts-mesh:latest
    container_name: fts-mesh
    restart: unless-stopped
    hostname: fts-mesh
    cap_add:
      - NET_ADMIN    # TUN device creation + ip route
      - NET_RAW      # Raw sockets for STUN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Mesh identity (set MESH_NODE_ID in .env or /etc/hookprobe/fortress.conf)
      MESH_NODE_ID: "${MESH_NODE_ID:-fortress001}"
      MESH_NODE_TYPE: fortress
      MESH_DATA_DIR: /opt/hookprobe/mesh/data
      # HTP configuration
      HTP_PRIMARY_PORT: 8144
      HTP_FALLBACK_PORT: 8543
      HTP_STEALTH_PORT: 8853
      HTP_RELAY_PORT: 3478
      # Neuro configuration
      NEURO_WEIGHT_DIR: /opt/hookprobe/mesh/neuro
      NEURO_DRIFT_THRESHOLD: 0.05
      # DSM configuration
      DSM_ENABLED: "true"
      DSM_CONSENSUS_QUORUM: 0.67
      DSM_CHECKPOINT_INTERVAL: 300
      # HTP VPN Gateway
      WAN_INTERFACE: "${WAN_INTERFACE:-eth0}"
      MAX_VPN_CLIENTS: "${MAX_VPN_CLIENTS:-20}"
      # Peer discovery (comma-separated list of known peers)
      MESH_BOOTSTRAP_PEERS: "${MESH_BOOTSTRAP_PEERS:-}"
      # Mesh uplink (optional)
      MESH_ENDPOINT: "${MESH_ENDPOINT:-}"
      MESH_API_KEY: "${MESH_API_KEY:-}"
      # Integration with local services
      # QSecBit runs on host network, access via gateway IP (172.20.200.1)
      QSECBIT_API_URL: http://172.20.200.1:9090
      DNSXAI_API_URL: http://fts-dnsxai:8080
      # Database credentials (for mesh consensus logging)
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD:-fortress_postgres_secure}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-fortress_redis_secret}"
      # Cortex visualization bridge
      CORTEX_ENABLED: "true"
      CORTEX_WS_PORT: 8766
    volumes:
      - mesh_data:/opt/hookprobe/mesh/data
      - mesh_neuro:/opt/hookprobe/mesh/neuro
      - /etc/hookprobe:/etc/hookprobe:ro
    ports:
      # HTP Primary (UDP-first design for low-latency mesh)
      - "0.0.0.0:8144:8144/udp"
      - "0.0.0.0:8144:8144/tcp"
      # HTP Fallback (TLS-wrapped, 8543 to avoid conflict with web UI on 8443)
      - "0.0.0.0:8543:8543/udp"
      - "0.0.0.0:8543:8543/tcp"
      # HTP Stealth (DoT/DoQ cover traffic, port 853 used by dnsXai for real DoT)
      - "0.0.0.0:8853:8853/udp"
      - "0.0.0.0:8853:8853/tcp"
      # STUN/TURN Relay for NAT traversal
      - "0.0.0.0:3478:3478/udp"
      # Cortex WebSocket (local only)
      - "127.0.0.1:8766:8766"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8766/health\", timeout=5)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      fts-internal:
        ipv4_address: 172.20.200.70

# Mesh volumes (only used when mesh is enabled)
volumes:
  mesh_data:
    driver: local
    name: fts-mesh-data
  mesh_neuro:
    driver: local
    name: fts-mesh-neuro

# Use the same network as main compose file
networks:
  fts-internal:
    external: true
    name: containers_fts-internal
