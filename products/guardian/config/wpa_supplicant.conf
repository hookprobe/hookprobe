# HookProbe Guardian - wpa_supplicant Configuration
# Upstream WiFi client connection (hotel/cafe/airport)
# Version: 5.5.0
#
# SECURITY: MAC randomization enabled to prevent tracking across networks.
# Each new network connection uses a different random MAC address.

ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
country=US

# ============================================
# MAC Address Randomization (Anti-Tracking)
# ============================================
# Randomize MAC during scanning (prevents passive tracking)
# 1 = use random MAC for each scan
mac_addr=1

# Randomize MAC during association (prevents network-level tracking)
# 1 = use random MAC when connecting to any network
preassoc_mac_addr=1

# Use a per-network stable random MAC (same MAC for same SSID)
# This avoids captive portal issues while still preventing cross-network tracking
rand_addr_lifetime=3600

# ============================================
# Upstream network configuration
# ============================================
# This is updated dynamically by Guardian SDN service
# Per-network MAC policy: 2 = per-network random (stable for captive portals)
network={
    ssid="UPSTREAM_SSID"
    psk="UPSTREAM_PASSWORD"
    key_mgmt=WPA-PSK
    priority=1
    scan_ssid=1
    mac_addr=2
}
