# HookProbe Guardian - dnsmasq Configuration
# Simple DHCP/DNS server for Guardian hotspot mode
# Version: 5.1.0
#
# Guardian Mode: Single network (192.168.4.0/27)
# For VLAN segmentation, use Fortress tier

# ============================================
# General Settings
# ============================================
domain-needed
bogus-priv
no-resolv
no-poll

# Local domain
domain=guardian.local
expand-hosts

# ============================================
# Upstream DNS Servers
# ============================================
# DNS-over-HTTPS proxy (encrypts upstream queries, prevents WiFi snooping)
# Runs on 127.0.0.1:5053 → HTTPS → Cloudflare/Quad9/Google
# See: products/guardian/lib/doh_proxy.py
server=127.0.0.1#5053

# Fallback: direct DNS if DoH proxy is not running
# (disabled by default - enable only if DoH proxy fails to start)
#server=1.1.1.1
#server=9.9.9.9

# ============================================
# Interface Configuration
# ============================================
# Listen on bridge (LAN clients) and loopback (Guardian system DNS).
# Both paths go through the same dnsXai blocklist + upstream forwarders.
# Without 127.0.0.1, the Guardian system itself can't use dnsmasq and
# falls back to whatever dhcpcd writes in /etc/resolv.conf (often the
# upstream gateway which doesn't serve DNS, breaking apt/pip/updates).
interface=br0
listen-address=127.0.0.1
bind-dynamic

# Do NOT listen on WAN interfaces
except-interface=eth0
except-interface=wlan0

# ============================================
# DHCP Configuration - Guardian Network
# ============================================
# Network: 192.168.4.0/27 (30 usable addresses)
# Gateway: 192.168.4.1
# Range:   192.168.4.2 - 192.168.4.30

dhcp-range=192.168.4.2,192.168.4.30,255.255.255.224,24h
dhcp-option=option:router,192.168.4.1
dhcp-option=option:dns-server,192.168.4.1
dhcp-option=option:domain-search,guardian.local

# Set hostname for Guardian
dhcp-option=option:netbios-ns,192.168.4.1

# ============================================
# DHCP Lease Settings
# ============================================
# Lease file location
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Send hostname to clients
dhcp-option=option:domain-name,guardian.local

# ============================================
# DNS Filtering Integration
# ============================================
# DNS Shield blocklist (if enabled)
# conf-file=/opt/hookprobe/guardian/dns-shield/blocklist.conf

# ============================================
# Logging
# ============================================
# Enable query logging for security monitoring
log-queries=extra
log-dhcp

# Log to file (rotated by logrotate) - used by dnsXai for query stats
log-facility=/var/log/hookprobe/dnsmasq-queries.log

# ============================================
# Performance
# ============================================
# Cache size (larger for DNS filtering)
cache-size=10000
